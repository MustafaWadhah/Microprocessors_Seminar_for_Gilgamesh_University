<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microprocessors Basics</title>
    <!-- Modern Fonts: Orbitron for Sci-Fi Sci-Fi feel and Inter for readable body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Background Sci-Fi Canvas -->
    <canvas id="bg-canvas"></canvas>

    <div class="presentation-container">
      <div id="slides-container" class="slides-container">
        <!-- Slides will be injected here via JavaScript -->
      </div>
    </div>

    <!-- Interface and Navigation Controls -->
    <div class="controls">
      <button id="prev-btn" class="nav-btn" aria-label="Previous Slide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      
      <div class="progress-container">
        <div id="progress-text" class="progress-text">1 / 30</div>
        <div class="progress-bar-bg">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <button id="next-btn" class="nav-btn" aria-label="Next Slide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
